<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Claude Memory Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════ THEME VARIABLES ═══════════════ */
:root {
  --font-ui: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-s: 6px;
  --radius-m: 10px;
  --radius-l: 14px;
  --transition: 180ms cubic-bezier(.4,0,.2,1);
  --shadow-s: 0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
  --shadow-m: 0 4px 16px rgba(0,0,0,.15), 0 2px 6px rgba(0,0,0,.1);
  --shadow-l: 0 12px 40px rgba(0,0,0,.2), 0 4px 12px rgba(0,0,0,.12);
}

[data-theme="dark"] {
  --bg-root: #0e1117;
  --bg-panel: #161b22;
  --bg-surface: #1c2129;
  --bg-hover: #252c36;
  --bg-active: #1a2744;
  --border: #2a3140;
  --border-focus: #58a6ff;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #545d68;
  --accent: #58a6ff;
  --accent-glow: rgba(88,166,255,.15);
  --accent-text: #58a6ff;
  --danger: #f85149;
  --danger-bg: rgba(248,81,73,.1);
  --success: #3fb950;
  --success-bg: rgba(63,185,80,.1);
  --tag-user: #388bfd;
  --tag-user-bg: rgba(56,139,253,.15);
  --tag-feedback: #3fb950;
  --tag-feedback-bg: rgba(63,185,80,.12);
  --tag-project: #d29922;
  --tag-project-bg: rgba(210,153,34,.12);
  --tag-reference: #bc8cff;
  --tag-reference-bg: rgba(188,140,255,.12);
  --badge-orphan: #f85149;
  --badge-unindexed: #d29922;
  --resize-handle: #2a3140;
  --resize-handle-hover: #58a6ff;
  --scrollbar-thumb: #2a3140;
  --scrollbar-hover: #3a4250;
}

[data-theme="light"] {
  --bg-root: #f0f2f5;
  --bg-panel: #ffffff;
  --bg-surface: #f6f8fa;
  --bg-hover: #eef1f5;
  --bg-active: #dce8f8;
  --border: #d8dee4;
  --border-focus: #0969da;
  --text-primary: #1f2328;
  --text-secondary: #656d76;
  --text-muted: #a0a8b2;
  --accent: #0969da;
  --accent-glow: rgba(9,105,218,.1);
  --accent-text: #0969da;
  --danger: #cf222e;
  --danger-bg: rgba(207,34,46,.06);
  --success: #1a7f37;
  --success-bg: rgba(26,127,55,.08);
  --tag-user: #0969da;
  --tag-user-bg: rgba(9,105,218,.1);
  --tag-feedback: #1a7f37;
  --tag-feedback-bg: rgba(26,127,55,.08);
  --tag-project: #9a6700;
  --tag-project-bg: rgba(154,103,0,.08);
  --tag-reference: #8250df;
  --tag-reference-bg: rgba(130,80,223,.08);
  --badge-orphan: #cf222e;
  --badge-unindexed: #9a6700;
  --resize-handle: #d8dee4;
  --resize-handle-hover: #0969da;
  --scrollbar-thumb: #d8dee4;
  --scrollbar-hover: #b8bfc7;
}

/* ═══════════════ BASE ═══════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg-root);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* Custom scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

/* ═══════════════ HEADER ═══════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo {
  width: 22px; height: 22px;
  background: linear-gradient(135deg, var(--accent), #a371f7);
  border-radius: var(--radius-s);
  display: flex; align-items: center; justify-content: center;
}
.logo svg { width: 14px; height: 14px; fill: #fff; }
.header-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.header-right { display: flex; align-items: center; gap: 8px; }

/* Header tabs */
.header-tabs { display: flex; gap: 2px; margin-left: 12px; background: var(--bg-surface); border-radius: var(--radius-s); padding: 2px; }
.header-tab {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 4px 14px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  transition: all var(--transition);
  letter-spacing: 0.2px;
}
.header-tab:hover { color: var(--text-secondary); }
.header-tab.active { color: var(--accent-text); background: var(--bg-panel); box-shadow: var(--shadow-s); }

.theme-toggle {
  width: 34px; height: 20px;
  border-radius: 10px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: var(--transition);
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--text-secondary);
  transition: var(--transition);
}
[data-theme="light"] .theme-toggle::after {
  transform: translateX(14px);
  background: var(--accent);
}
.theme-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }

/* ═══════════════ MAIN LAYOUT ═══════════════ */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 8px;
  gap: 0;
}

/* ═══════════════ PANELS ═══════════════ */
.panel {
  background: var(--bg-panel);
  border-radius: var(--radius-l);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-s);
  transition: box-shadow var(--transition);
  min-width: 0;
}

/* ═══════════════ RESIZE HANDLES ═══════════════ */
.resize-handle {
  width: 8px;
  flex-shrink: 0;
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 5;
}
.resize-handle::after {
  content: '';
  width: 2px;
  height: 32px;
  border-radius: 1px;
  background: var(--resize-handle);
  transition: var(--transition);
}
.resize-handle:hover::after,
.resize-handle.dragging::after {
  background: var(--resize-handle-hover);
  height: 48px;
  box-shadow: 0 0 8px var(--accent-glow);
}

/* ═══════════════ LEFT PANEL — FOLDERS ═══════════════ */
.folders { width: 230px; min-width: 140px; }
.folders-header {
  padding: 14px 16px 10px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.folders-list { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
.folder {
  padding: 8px 12px;
  border-radius: var(--radius-m);
  cursor: pointer;
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  transition: all var(--transition);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
  border: 1px solid transparent;
}
.folder:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}
.folder.active {
  background: var(--bg-active);
  color: var(--accent-text);
  font-weight: 500;
  border-color: rgba(88,166,255,.2);
}
.folder.dragover {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}
.folder-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.folder-icon { margin-right: 8px; font-size: 15px; opacity: .7; flex-shrink: 0; }
.folder .count {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--bg-surface);
  padding: 1px 7px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-left: 8px;
}
.folder.active .count { color: var(--accent-text); background: var(--accent-glow); }

/* ═══════════════ MIDDLE PANEL — MEMORY LIST ═══════════════ */
.memories { flex: 1; min-width: 200px; }
.memory-list { flex: 1; overflow-y: auto; }
.memory-list table { width: 100%; border-collapse: collapse; }
.memory-list th {
  background: var(--bg-surface);
  text-align: left;
  padding: 0 16px;
  height: 42px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-muted);
  position: sticky;
  top: 0;
  z-index: 2;
  border-bottom: 1px solid var(--border);
}
.memory-list td {
  padding: 10px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  color: var(--text-secondary);
}
.memory-list tr { transition: background var(--transition); }
.memory-list tbody tr:hover { background: var(--bg-hover); }
.memory-list tbody tr:hover td { color: var(--text-primary); }
.memory-list tr.row-active td { color: var(--text-primary); background: var(--bg-active); }
.memory-list tr[draggable="true"] { cursor: grab; }
.memory-list tr[draggable="true"]:active { cursor: grabbing; }
.mem-name { font-weight: 500; font-family: var(--font-mono); font-size: 12px; color: var(--text-primary); }
.mobile-desc { display: none; }

/* Checkbox */
.mem-check {
  appearance: none;
  width: 16px; height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  background: transparent;
}
.mem-check:checked {
  background: var(--accent);
  border-color: var(--accent);
}
.mem-check:checked::after {
  content: '';
  position: absolute;
  left: 4.5px; top: 1.5px;
  width: 4px; height: 8px;
  border: solid #fff; border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.mem-check:hover { border-color: var(--accent); }

/* Type tags */
.type-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 6px;
  letter-spacing: 0.2px;
}
.type-tag.user { color: var(--tag-user); background: var(--tag-user-bg); }
.type-tag.feedback { color: var(--tag-feedback); background: var(--tag-feedback-bg); }
.type-tag.project { color: var(--tag-project); background: var(--tag-project-bg); }
.type-tag.reference { color: var(--tag-reference); background: var(--tag-reference-bg); }
.type-tag.unknown { color: var(--text-muted); background: var(--bg-surface); }

/* Status badges */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.badge.orphan { color: var(--badge-orphan); background: var(--danger-bg); }
.badge.unindexed { color: var(--badge-unindexed); background: var(--tag-project-bg); }

/* Toolbar */
.toolbar {
  padding: 0 16px;
  height: 42px;
  border-top: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  border-radius: 0 0 var(--radius-l) var(--radius-l);
}
.btn {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-muted); }
.btn.danger { color: var(--danger); border-color: transparent; background: var(--danger-bg); }
.btn.danger:hover { background: var(--danger); color: #fff; }
.btn-import {
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-import:hover { background: var(--bg-hover); color: var(--text-primary); }
.toolbar select {
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  background: var(--bg-panel);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  outline: none;
}
.toolbar select:hover { border-color: var(--text-muted); }
.toolbar select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

/* Inline index edit */
.desc-edit {
  border: 1px solid var(--accent);
  padding: 4px 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  width: 100%;
  border-radius: var(--radius-s);
  background: var(--bg-root);
  color: var(--text-primary);
  outline: none;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ═══════════════ RIGHT PANEL — PREVIEW ═══════════════ */
.preview { flex: 1; min-width: 200px; }
.preview-header {
  padding: 0 16px;
  height: 42px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: var(--radius-l) var(--radius-l) 0 0;
}
.preview-header .filename {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 13px;
  color: var(--accent-text);
}
.preview-header .btn { font-size: 12px; }
.preview-body { flex: 1; overflow-y: auto; padding: 16px; }
.preview-body pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.preview-body textarea {
  width: 100%;
  height: 100%;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  border: 1px solid var(--border);
  border-radius: var(--radius-m);
  padding: 12px;
  resize: none;
  background: var(--bg-root);
  color: var(--text-primary);
  outline: none;
  transition: border var(--transition);
}
.preview-body textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ═══════════════ SETTINGS VIEWER ═══════════════ */
.settings-viewer { flex: 1; min-width: 200px; }
.settings-viewer-header {
  padding: 0 8px;
  height: 42px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  gap: 0;
  border-radius: var(--radius-l) var(--radius-l) 0 0;
}
.settings-file-tab {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  padding: 8px 14px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.settings-file-tab:hover { color: var(--text-primary); }
.settings-file-tab.active { color: var(--accent-text); }
.settings-file-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 14px; right: 14px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px;
}
.settings-body { flex: 1; overflow-y: auto; padding: 20px; }
.settings-body pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  tab-size: 2;
  counter-reset: line;
}
.settings-body .json-line {
  display: block;
  margin: 0;
  padding: 0;
  line-height: 1.5;
  counter-increment: line;
}
.settings-body .json-line::before {
  content: counter(line);
  display: inline-block;
  width: 3.5em;
  margin-right: 1em;
  text-align: right;
  color: var(--text-muted);
  font-size: 11px;
  user-select: none;
  opacity: .5;
}
.json-key { color: var(--accent-text); }
.json-string { color: var(--tag-feedback); }
.json-number { color: var(--tag-project); }
.json-bool { color: var(--tag-reference); }
.json-null { color: var(--tag-reference); font-style: italic; }
.json-brace { color: var(--text-muted); }

/* ═══════════════ EMPTY STATE ═══════════════ */
.empty-state {
  color: var(--text-muted);
  text-align: center;
  padding: 60px 24px;
  font-size: 13px;
  font-weight: 400;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  height: 100%;
  justify-content: center;
}
.empty-icon { font-size: 32px; opacity: .4; margin-bottom: 4px; }

/* ═══════════════ STATUS BAR ═══════════════ */
.status-bar {
  padding: 6px 20px;
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  min-height: 30px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  transition: color var(--transition);
}
.status-bar.success { color: var(--success); }
.status-bar.error { color: var(--danger); }

/* ═══════════════ ANIMATIONS ═══════════════ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.folder { animation: fadeIn .2s ease both; }
.folder:nth-child(1) { animation-delay: .02s; }
.folder:nth-child(2) { animation-delay: .04s; }
.folder:nth-child(3) { animation-delay: .06s; }
.folder:nth-child(4) { animation-delay: .08s; }
.folder:nth-child(5) { animation-delay: .1s; }
.folder:nth-child(6) { animation-delay: .12s; }
.folder:nth-child(7) { animation-delay: .14s; }
.folder:nth-child(8) { animation-delay: .16s; }
.folder:nth-child(9) { animation-delay: .18s; }
.folder:nth-child(10) { animation-delay: .2s; }

.memory-list tbody tr { animation: fadeIn .15s ease both; }
.memory-list tbody tr:nth-child(1) { animation-delay: .02s; }
.memory-list tbody tr:nth-child(2) { animation-delay: .04s; }
.memory-list tbody tr:nth-child(3) { animation-delay: .06s; }
.memory-list tbody tr:nth-child(4) { animation-delay: .08s; }
.memory-list tbody tr:nth-child(5) { animation-delay: .1s; }
.memory-list tbody tr:nth-child(6) { animation-delay: .12s; }
.memory-list tbody tr:nth-child(7) { animation-delay: .14s; }
.memory-list tbody tr:nth-child(8) { animation-delay: .16s; }
.memory-list tbody tr:nth-child(9) { animation-delay: .18s; }
.memory-list tbody tr:nth-child(10) { animation-delay: .2s; }

/* ═══════════════ MOBILE TAB BAR ═══════════════ */
.mobile-tabs {
  display: none;
  height: 52px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.mobile-tabs button {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: color var(--transition);
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.mobile-tabs button .tab-icon { font-size: 18px; line-height: 1; }
.mobile-tabs button.active {
  color: var(--accent-text);
}
.mobile-tabs button.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
}

/* ═══════════════ CONTEXT MENU (mobile long-press) ═══════════════ */
.ctx-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,.4);
  -webkit-tap-highlight-color: transparent;
}
.ctx-overlay.open { display: block; }
.ctx-menu {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 101;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  border-radius: var(--radius-l) var(--radius-l) 0 0;
  padding: 8px 0 env(safe-area-inset-bottom, 8px);
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  max-height: 70vh;
  overflow-y: auto;
}
.ctx-overlay.open .ctx-menu { transform: translateY(0); }
.ctx-menu-title {
  padding: 14px 20px 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-text);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ctx-menu-section {
  padding: 6px 20px 4px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.ctx-menu-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  font-size: 15px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.ctx-menu-item:active { background: var(--bg-hover); }
.ctx-menu-item .ctx-icon { font-size: 17px; width: 24px; text-align: center; flex-shrink: 0; }
.ctx-menu-item.danger { color: var(--danger); }
.ctx-menu-cancel {
  display: block;
  width: calc(100% - 32px);
  margin: 8px 16px;
  padding: 14px;
  font-family: var(--font-ui);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent-text);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-m);
  cursor: pointer;
  text-align: center;
  -webkit-tap-highlight-color: transparent;
}
.ctx-menu-cancel:active { background: var(--bg-hover); }

/* ═══════════════ MOBILE LAYOUT ═══════════════ */
@media (max-width: 767px) {
  html, body { height: 100%; overflow: hidden; }
  body { height: 100dvh; }

  .header { padding: 0 14px; height: 44px; }
  .header-title { font-size: 13px; }

  .main {
    padding: 0;
    gap: 0;
    position: relative;
  }

  .resize-handle { display: none !important; }

  .mobile-tabs { display: flex; }

  .panel {
    position: absolute;
    inset: 0;
    border-radius: 0;
    border: none;
    box-shadow: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
    width: 100% !important;
  }
  .panel.mobile-visible {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }

  /* Folders panel */
  .folders { width: 100% !important; min-width: 0; }
  .folders-header { padding: 12px 16px 8px; }
  .folder { padding: 12px 14px; font-size: 14px; }
  .folder-icon { font-size: 17px; }

  /* Memory list */
  .memories { width: 100% !important; min-width: 0; }
  .memory-list td { padding: 12px 14px; font-size: 14px; }
  .memory-list th { padding: 0 14px; height: 38px; }
  .memory-list th:last-child { display: none; }
  .memory-list td:last-child { display: none; }
  .mobile-desc {
    display: block;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 3px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mem-name { font-size: 13px; }
  .mem-check { width: 20px; height: 20px; }
  .mem-check:checked::after { left: 5.5px; top: 2px; width: 5px; height: 9px; }

  /* Toolbar */
  .toolbar {
    height: auto;
    padding: 8px 10px;
    gap: 6px;
    flex-wrap: wrap;
  }
  .toolbar select,
  .toolbar .btn,
  .toolbar .btn-import {
    font-size: 12px;
    padding: 8px 12px;
    min-height: 36px;
  }

  /* Preview */
  .preview { width: 100% !important; min-width: 0; }
  .preview-header { padding: 0 14px; }
  .preview-body { padding: 14px; }
  .preview-body pre { font-size: 12px; line-height: 1.6; }
  .preview-body textarea { font-size: 14px; line-height: 1.6; }

  /* Settings viewer mobile */
  .settings-viewer { width: 100% !important; min-width: 0; }
  .settings-body { padding: 14px; }
  .settings-body pre { font-size: 12px; line-height: 1.6; }
  .header-tabs { margin-left: 8px; }
  .header-tab { font-size: 11px; padding: 3px 10px; }

  /* Status bar */
  .status-bar { padding: 4px 14px; min-height: 26px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>
    <span class="header-title">Claude Memory Manager</span>
    <div class="header-tabs">
      <button class="header-tab active" data-tab="memories" onclick="switchTab('memories')">Memories</button>
      <button class="header-tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    </div>
  </div>
  <div class="header-right">
    <span class="theme-label">Dark</span>
    <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></div>
    <span class="theme-label">Light</span>
  </div>
</div>

<div class="main">
  <div class="panel folders" id="foldersPanel">
    <div class="folders-header">Containers</div>
    <div class="folders-list" id="folders"></div>
  </div>
  <div class="resize-handle" id="resizeLeft"></div>
  <div class="panel memories">
    <div class="memory-list" id="memoryList">
      <div class="empty-state"><span class="empty-icon">&#128193;</span>Select a container</div>
    </div>
    <div class="toolbar">
      <select id="moveTarget"><option value="">Move to...</option></select>
      <button class="btn" onclick="doMove()">&#8618; Move</button>
      <button class="btn danger" onclick="doDelete()">&#10005; Delete</button>
      <button class="btn" onclick="doExport()">&#8615; Export</button>
      <label class="btn-import">
        &#8613; Import <input type="file" accept=".zip" onchange="doImport(this)" style="display:none;">
      </label>
    </div>
  </div>
  <div class="resize-handle" id="resizeRight"></div>
  <div class="panel preview" id="preview">
    <div class="empty-state"><span class="empty-icon">&#128196;</span>Select a memory to preview</div>
  </div>
  <div class="panel folders settings-panel" id="settingsFoldersPanel" style="display:none">
    <div class="folders-header">Settings</div>
    <div class="folders-list" id="settingsFolders"></div>
  </div>
  <div class="settings-gap settings-panel" style="display:none;width:8px;flex-shrink:0"></div>
  <div class="panel settings-viewer settings-panel" id="settingsViewer" style="display:none">
    <div class="empty-state"><span class="empty-icon">&#9881;</span>Select a container to view settings</div>
  </div>
</div>
<div class="ctx-overlay" id="ctxOverlay" onclick="closeCtxMenu()">
  <div class="ctx-menu" onclick="event.stopPropagation()" id="ctxMenu"></div>
</div>
<div class="mobile-tabs" id="mobileTabs">
  <button class="active" data-panel="folders" onclick="switchMobileTab('folders')">
    <span class="tab-icon">&#128193;</span>Containers
  </button>
  <button data-panel="memories" onclick="switchMobileTab('memories')">
    <span class="tab-icon">&#128203;</span>Memories
  </button>
  <button data-panel="preview" onclick="switchMobileTab('preview')">
    <span class="tab-icon">&#128196;</span>Preview
  </button>
</div>
<div class="status-bar" id="statusBar"></div>

<script>
/* ═══════════════ THEME TOGGLE ═══════════════ */
function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', html.dataset.theme);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.dataset.theme = saved;
})();

/* ═══════════════ RESIZABLE PANELS ═══════════════ */
const foldersPanel = document.getElementById('foldersPanel');
const memoriesPanel = document.querySelector('.memories');
const previewPanel = document.getElementById('preview');
const MIN_W = 140;

// Initialize all panels to fixed pixel widths on load
function initPanelWidths() {
  const fw = foldersPanel.getBoundingClientRect().width;
  const mw = memoriesPanel.getBoundingClientRect().width;
  const pw = previewPanel.getBoundingClientRect().width;
  foldersPanel.style.flex = 'none';
  foldersPanel.style.width = fw + 'px';
  memoriesPanel.style.flex = 'none';
  memoriesPanel.style.width = mw + 'px';
  previewPanel.style.flex = 'none';
  previewPanel.style.width = pw + 'px';
}
// Defer until layout is stable
requestAnimationFrame(initPanelWidths);

function initResize(handleId, leftEl, rightEl) {
  const handle = document.getElementById(handleId);
  let startX, startLeftW, startRightW, totalW;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    startX = e.clientX;
    startLeftW = leftEl.getBoundingClientRect().width;
    startRightW = rightEl.getBoundingClientRect().width;
    totalW = startLeftW + startRightW;

    function onMove(e) {
      let dx = e.clientX - startX;
      let newLeft = startLeftW + dx;
      newLeft = Math.max(MIN_W, Math.min(newLeft, totalW - MIN_W));
      leftEl.style.width = newLeft + 'px';
      rightEl.style.width = (totalW - newLeft) + 'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

initResize('resizeLeft', foldersPanel, memoriesPanel);
initResize('resizeRight', memoriesPanel, previewPanel);

/* ═══════════════ STATE ═══════════════ */
let containers = [];
let currentContainer = null;
let currentMemories = [];
let previewFile = null;
let previewContent = null;
let editing = false;

async function api(url, opts = {}) {
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: resp.statusText }));
    throw new Error(err.error || resp.statusText);
  }
  return resp;
}

function status(msg, type = '') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + type;
  if (type) setTimeout(() => { bar.textContent = ''; bar.className = 'status-bar'; }, 5000);
}

function getSelected() {
  return [...document.querySelectorAll('.mem-check:checked')].map(cb => cb.dataset.file);
}

/* ═══════════════ FOLDERS ═══════════════ */
async function loadContainers() {
  const resp = await api('/api/containers');
  containers = await resp.json();
  renderFolders();
  updateMoveDropdown();
}

function renderFolders() {
  const el = document.getElementById('folders');
  el.innerHTML = containers.map(c => {
    const icon = c.id === 'global' ? '&#127760;' : '&#128194;';
    return `
    <div class="folder ${currentContainer && currentContainer.id === c.id ? 'active' : ''}"
         data-id="${c.id}" onclick="selectFolder('${c.id}')"
         ondragover="event.preventDefault(); this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="dropOnFolder(event, '${c.id}')">
      <span class="folder-icon">${icon}</span>
      <span class="folder-name">${c.name}</span>
      <span class="count">${c.count}</span>
    </div>`;
  }).join('');
}

function updateMoveDropdown() {
  const sel = document.getElementById('moveTarget');
  sel.innerHTML = '<option value="">Move to...</option>' +
    containers.filter(c => !currentContainer || c.id !== currentContainer.id)
      .map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function selectFolder(id) {
  currentContainer = containers.find(c => c.id === id);
  localStorage.setItem('selectedContainer', id);
  localStorage.removeItem('selectedMemory');
  renderFolders();
  updateMoveDropdown();
  await loadMemories();
  previewFile = null;
  previewContent = null;
  editing = false;
  document.getElementById('preview').innerHTML = '<div class="empty-state"><span class="empty-icon">&#128196;</span>Select a memory to preview</div>';
}

/* ═══════════════ MEMORIES ═══════════════ */
async function loadMemories() {
  if (!currentContainer) return;
  const resp = await api(`/api/memories/${currentContainer.id}`);
  currentMemories = await resp.json();
  renderMemories();
}

function renderMemories() {
  const el = document.getElementById('memoryList');
  if (currentMemories.length === 0) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">&#128173;</span>No memories here</div>';
    return;
  }
  el.innerHTML = `<table>
    <thead><tr>
      <th style="width:36px"><input type="checkbox" class="mem-check" onchange="toggleAll(this)"></th>
      <th>Name</th>
      <th>Description</th>
    </tr></thead>
    <tbody>${currentMemories.map(m => `
      <tr draggable="true" data-file="${m.filename}" id="row-${m.filename}"
          onclick="selectMemory('${m.filename}', event)"
          ondragstart="dragStart(event, '${m.filename}')">
        <td><input type="checkbox" class="mem-check" data-file="${m.filename}" onclick="event.stopPropagation()"></td>
        <td><span class="mem-name">${m.name}</span>${m.status !== 'ok' ? `<span class="badge ${m.status}">${m.status}</span>` : ''}${m.description ? `<span class="mobile-desc">${m.description}</span>` : ''}</td>
        <td style="color:var(--text-secondary);font-size:12px">${m.description || '<span style="color:var(--text-muted);font-style:italic">no description</span>'}</td>
      </tr>
    `).join('')}</tbody>
  </table>`;
  highlightActiveRow();
  attachLongPress();
}

function highlightActiveRow() {
  document.querySelectorAll('.memory-list tbody tr').forEach(tr => tr.classList.remove('row-active'));
  if (previewFile) {
    const row = document.getElementById('row-' + previewFile);
    if (row) row.classList.add('row-active');
  }
}

function toggleAll(master) {
  document.querySelectorAll('.mem-check[data-file]').forEach(cb => cb.checked = master.checked);
}

async function selectMemory(filename, event) {
  if (event && (event.target.tagName === 'INPUT' || event.target.classList.contains('desc-edit'))) return;
  previewFile = filename;
  localStorage.setItem('selectedMemory', filename);
  highlightActiveRow();
  const resp = await api(`/api/memory/${currentContainer.id}/${filename}`);
  const data = await resp.json();
  previewContent = data.content;
  editing = false;
  renderPreview();
}

/* ═══════════════ PREVIEW / EDIT ═══════════════ */
function renderPreview() {
  const el = document.getElementById('preview');
  if (!previewFile) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">&#128196;</span>Select a memory to preview</div>';
    return;
  }
  const escaped = previewContent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if (editing) {
    el.innerHTML = `
      <div class="preview-header">
        <span class="filename">${previewFile}</span>
        <div style="display:flex;gap:6px">
          <button class="btn" onclick="saveEdit()" style="border-color:var(--success);color:var(--success)">&#10003; Save</button>
          <button class="btn" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>
      <div class="preview-body"><textarea id="editArea">${escaped}</textarea></div>`;
  } else {
    el.innerHTML = `
      <div class="preview-header">
        <span class="filename">${previewFile}</span>
        <button class="btn" onclick="startEdit()">&#9998; Edit</button>
      </div>
      <div class="preview-body"><pre>${escaped}</pre></div>`;
  }
}

function startEdit() { editing = true; renderPreview(); }
function cancelEdit() { editing = false; renderPreview(); }

async function saveEdit() {
  const newContent = document.getElementById('editArea').value;
  try {
    await api(`/api/memory/${currentContainer.id}/${previewFile}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ old_content: previewContent, new_content: newContent }),
    });
    previewContent = newContent;
    editing = false;
    renderPreview();
    status('Saved successfully', 'success');
  } catch (e) { status(e.message, 'error'); }
}

/* ═══════════════ INLINE INDEX EDIT ═══════════════ */

/* ═══════════════ OPERATIONS ═══════════════ */
async function doMove() {
  const files = getSelected();
  const target = document.getElementById('moveTarget').value;
  if (!files.length) { status('Select memories first', 'error'); return; }
  if (!target) { status('Select a target folder', 'error'); return; }
  try {
    await api('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, from: currentContainer.id, to: target }),
    });
    status(`Moved ${files.length} item(s)`, 'success');
    await loadContainers();
    await loadMemories();
  } catch (e) { status(e.message, 'error'); }
}

async function doDelete() {
  const files = getSelected();
  if (!files.length) { status('Select memories first', 'error'); return; }
  if (!confirm(`Delete ${files.length} memory file(s)?`)) return;
  try {
    await api('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, container: currentContainer.id }),
    });
    status(`Deleted ${files.length} item(s)`, 'success');
    await loadContainers();
    await loadMemories();
    if (files.includes(previewFile)) { previewFile = null; previewContent = null; renderPreview(); }
  } catch (e) { status(e.message, 'error'); }
}

async function doExport() {
  const files = getSelected();
  if (!files.length) { status('Select memories first', 'error'); return; }
  try {
    const resp = await fetch('/api/export', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files, container: currentContainer.id }),
    });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.error); }
    const blob = await resp.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'claude-memory-export.zip';
    a.click();
    URL.revokeObjectURL(a.href);
    status('Exported', 'success');
  } catch (e) { status(e.message, 'error'); }
}

async function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (!currentContainer) { status('Select a target folder first', 'error'); return; }
  const form = new FormData();
  form.append('file', file);
  form.append('container', currentContainer.id);
  try {
    await api('/api/import', { method: 'POST', body: form });
    status('Imported successfully', 'success');
    await loadContainers();
    await loadMemories();
  } catch (e) { status(e.message, 'error'); }
  input.value = '';
}

/* ═══════════════ DRAG AND DROP ═══════════════ */
function dragStart(event, filename) {
  let files = getSelected();
  if (!files.includes(filename)) files = [filename];
  event.dataTransfer.setData('application/json', JSON.stringify({ files, from: currentContainer.id }));
  event.dataTransfer.effectAllowed = 'move';
  status(`Dragging ${files.length} item(s)...`);
}

async function dropOnFolder(event, targetId) {
  event.preventDefault();
  event.currentTarget.classList.remove('dragover');
  const data = JSON.parse(event.dataTransfer.getData('application/json'));
  if (data.from === targetId) return;
  try {
    await api('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: data.files, from: data.from, to: targetId }),
    });
    const target = containers.find(c => c.id === targetId);
    status(`Moved ${data.files.length} item(s) to ${target ? target.name : targetId}`, 'success');
    await loadContainers();
    if (currentContainer && currentContainer.id === data.from) await loadMemories();
  } catch (e) { status(e.message, 'error'); }
}

/* ═══════════════ LONG-PRESS CONTEXT MENU ═══════════════ */
let longPressTimer = null;
let longPressTriggered = false;

function attachLongPress() {
  if (!isMobile()) return;
  document.querySelectorAll('.memory-list tbody tr[data-file]').forEach(row => {
    row.addEventListener('touchstart', onTouchStart, { passive: true });
    row.addEventListener('touchend', onTouchEnd);
    row.addEventListener('touchmove', onTouchCancel);
    row.addEventListener('touchcancel', onTouchCancel);
  });
}

function onTouchStart(e) {
  longPressTriggered = false;
  const row = e.currentTarget;
  const filename = row.dataset.file;
  longPressTimer = setTimeout(() => {
    longPressTriggered = true;
    navigator.vibrate && navigator.vibrate(30);
    openCtxMenu(filename);
  }, 500);
}

function onTouchEnd(e) {
  clearTimeout(longPressTimer);
  if (longPressTriggered) {
    e.preventDefault();
  }
}

function onTouchCancel() {
  clearTimeout(longPressTimer);
  longPressTriggered = false;
}

function openCtxMenu(filename) {
  const mem = currentMemories.find(m => m.filename === filename);
  const overlay = document.getElementById('ctxOverlay');
  const menu = document.getElementById('ctxMenu');

  const moveTargets = containers
    .filter(c => !currentContainer || c.id !== currentContainer.id)
    .map(c => {
      const icon = c.id === 'global' ? '🌐' : '📂';
      return `<div class="ctx-menu-item" onclick="ctxMove('${filename}','${c.id}')">`
        + `<span class="ctx-icon">${icon}</span>${c.name}</div>`;
    }).join('');

  menu.innerHTML = `
    <div class="ctx-menu-title">${mem ? mem.name : filename}</div>
    <div class="ctx-menu-item" onclick="ctxPreview('${filename}')">
      <span class="ctx-icon">👁</span>Preview
    </div>
    <div class="ctx-menu-section">Move to</div>
    ${moveTargets}
    <div class="ctx-menu-item danger" onclick="ctxDelete('${filename}')">
      <span class="ctx-icon">✕</span>Delete
    </div>
    <button class="ctx-menu-cancel" onclick="closeCtxMenu()">Cancel</button>
  `;

  overlay.classList.add('open');
}

function closeCtxMenu() {
  document.getElementById('ctxOverlay').classList.remove('open');
}

async function ctxPreview(filename) {
  closeCtxMenu();
  await _origSelectMemory(filename);
  switchMobileTab('preview');
}

async function ctxMove(filename, targetId) {
  closeCtxMenu();
  try {
    await api('/api/move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: [filename], from: currentContainer.id, to: targetId }),
    });
    const target = containers.find(c => c.id === targetId);
    status(`Moved to ${target ? target.name : targetId}`, 'success');
    await loadContainers();
    await loadMemories();
  } catch (e) { status(e.message, 'error'); }
}

async function ctxDelete(filename) {
  closeCtxMenu();
  if (!confirm(`Delete ${filename}?`)) return;
  try {
    await api('/api/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ files: [filename], container: currentContainer.id }),
    });
    status('Deleted', 'success');
    await loadContainers();
    await loadMemories();
    if (previewFile === filename) { previewFile = null; previewContent = null; renderPreview(); }
  } catch (e) { status(e.message, 'error'); }
}

/* ═══════════════ MOBILE PANELS ═══════════════ */
const isMobile = () => window.matchMedia('(max-width: 767px)').matches;

function switchMobileTab(panel) {
  if (!isMobile()) return;
  document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mobile-tabs button[data-panel="${panel}"]`).classList.add('active');
  document.querySelectorAll('.main .panel').forEach(p => p.classList.remove('mobile-visible'));
  if (panel === 'folders') foldersPanel.classList.add('mobile-visible');
  else if (panel === 'memories') document.querySelector('.memories').classList.add('mobile-visible');
  else previewPanel.classList.add('mobile-visible');
}

function applyMobileLayout() {
  if (isMobile()) {
    // Reset inline widths set by resize logic
    [foldersPanel, memoriesPanel, previewPanel].forEach(p => {
      p.style.flex = '';
      p.style.width = '';
    });
    // Show whichever tab is active
    const activeTab = document.querySelector('.mobile-tabs button.active');
    if (activeTab) switchMobileTab(activeTab.dataset.panel);
    else switchMobileTab('folders');
  } else {
    // Desktop: remove mobile-visible, restore panel sizing
    document.querySelectorAll('.main .panel').forEach(p => p.classList.remove('mobile-visible'));
    initPanelWidths();
  }
}

window.addEventListener('resize', applyMobileLayout);
// Apply on load
requestAnimationFrame(applyMobileLayout);

// Override selectFolder to auto-switch to memories tab on mobile
const _origSelectFolder = selectFolder;
selectFolder = async function(id) {
  await _origSelectFolder(id);
  if (isMobile()) switchMobileTab('memories');
};

// Override selectMemory to auto-switch to preview tab on mobile
const _origSelectMemory = selectMemory;
selectMemory = async function(filename, event) {
  await _origSelectMemory(filename, event);
  if (isMobile()) switchMobileTab('preview');
};

/* ═══════════════ SETTINGS TAB ═══════════════ */
// NOTE: innerHTML usage is safe here — all data comes from local ~/.claude/ files
// owned by the user, not from untrusted external sources. The existing codebase
// uses innerHTML throughout for the same reason.
let activeTab = 'memories';
let settingsContainers = [];
let currentSettingsContainer = null;
let settingsFiles = [];
let currentSettingsFile = null;
let settingsContent = null;

function switchTab(tab) {
  activeTab = tab;
  localStorage.setItem('activeTab', tab);
  document.querySelectorAll('.header-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.header-tab[data-tab="${tab}"]`).classList.add('active');

  const memEls = [foldersPanel, document.querySelector('.memories'), previewPanel,
                  document.getElementById('resizeLeft'), document.getElementById('resizeRight')];
  const setEls = document.querySelectorAll('.settings-panel');

  if (tab === 'memories') {
    memEls.forEach(el => el.style.display = '');
    setEls.forEach(el => el.style.display = 'none');
    if (isMobile()) {
      document.getElementById('mobileTabs').innerHTML = `
        <button class="active" data-panel="folders" onclick="switchMobileTab('folders')">
          <span class="tab-icon">&#128193;</span>Containers
        </button>
        <button data-panel="memories" onclick="switchMobileTab('memories')">
          <span class="tab-icon">&#128203;</span>Memories
        </button>
        <button data-panel="preview" onclick="switchMobileTab('preview')">
          <span class="tab-icon">&#128196;</span>Preview
        </button>`;
      switchMobileTab('folders');
    }
  } else {
    memEls.forEach(el => el.style.display = 'none');
    setEls.forEach(el => el.style.display = '');
    document.getElementById('settingsFoldersPanel').style.width = '230px';
    document.getElementById('settingsFoldersPanel').style.flex = 'none';
    document.getElementById('settingsViewer').style.flex = '1';
    loadSettingsContainers();
    if (isMobile()) {
      document.getElementById('mobileTabs').innerHTML = `
        <button class="active" data-panel="settingsFolders" onclick="switchMobileSettingsTab('settingsFolders')">
          <span class="tab-icon">&#9881;</span>Settings
        </button>
        <button data-panel="settingsViewer" onclick="switchMobileSettingsTab('settingsViewer')">
          <span class="tab-icon">&#128196;</span>Viewer
        </button>`;
      switchMobileSettingsTab('settingsFolders');
    }
  }
}

function switchMobileSettingsTab(panel) {
  if (!isMobile()) return;
  document.querySelectorAll('.mobile-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mobile-tabs button[data-panel="${panel}"]`).classList.add('active');
  document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('mobile-visible'));
  document.getElementById(panel === 'settingsFolders' ? 'settingsFoldersPanel' : 'settingsViewer').classList.add('mobile-visible');
}

async function loadSettingsContainers() {
  const resp = await api('/api/settings-containers');
  settingsContainers = await resp.json();
  renderSettingsFolders();
}

function renderSettingsFolders() {
  const el = document.getElementById('settingsFolders');
  el.innerHTML = settingsContainers.map(c => {
    const icon = c.id === 'global' ? '&#127760;' : '&#128194;';
    return `
    <div class="folder ${currentSettingsContainer && currentSettingsContainer.id === c.id ? 'active' : ''}"
         data-id="${c.id}" onclick="selectSettingsFolder('${c.id}')">
      <span class="folder-icon">${icon}</span>
      <span class="folder-name">${c.name}</span>
      <span class="count">${c.files.length}</span>
    </div>`;
  }).join('');
}

async function selectSettingsFolder(id) {
  currentSettingsContainer = settingsContainers.find(c => c.id === id);
  settingsFiles = currentSettingsContainer.files;
  localStorage.setItem('selectedSettingsContainer', id);
  renderSettingsFolders();
  await selectSettingsFile(settingsFiles[0]);
  if (isMobile()) switchMobileSettingsTab('settingsViewer');
}

async function selectSettingsFile(filename) {
  currentSettingsFile = filename;
  localStorage.setItem('selectedSettingsFile', filename);
  try {
    const resp = await api(`/api/settings/${currentSettingsContainer.id}/${filename}`);
    const data = await resp.json();
    settingsContent = data.content;
    renderSettingsViewer();
  } catch (e) {
    status(e.message, 'error');
  }
}

function highlightJSON(raw) {
  let str;
  try { str = JSON.stringify(JSON.parse(raw), null, 2); } catch(e) { str = raw; }
  str = str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  str = str
    .replace(/"([^"\\]|\\.)*"\s*:/g, m => `<span class="json-key">${m}</span>`)
    .replace(/:\s*"([^"\\]|\\.)*"/g, m => {
      const i = m.indexOf('"');
      return m.slice(0, i) + '<span class="json-string">' + m.slice(i) + '</span>';
    })
    .replace(/:\s*(-?\d+\.?\d*)/g, (m, n) => m.replace(n, `<span class="json-number">${n}</span>`))
    .replace(/:\s*(true|false)/g, (m, b) => m.replace(b, `<span class="json-bool">${b}</span>`))
    .replace(/:\s*(null)/g, (m, n) => m.replace(n, `<span class="json-null">${n}</span>`))
    .replace(/([{}[\]])/g, '<span class="json-brace">$1</span>');
  return str.split('\n').map(line => `<span class="json-line">${line}</span>`).join('');
}

function renderSettingsViewer() {
  const el = document.getElementById('settingsViewer');
  if (!currentSettingsContainer) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">&#9881;</span>Select a container to view settings</div>';
    return;
  }
  const tabs = settingsFiles.map(f =>
    `<button class="settings-file-tab ${f === currentSettingsFile ? 'active' : ''}"
             onclick="selectSettingsFile('${f}')">${f}</button>`
  ).join('');
  el.innerHTML = `
    <div class="settings-viewer-header">${tabs}</div>
    <div class="settings-body"><pre>${highlightJSON(settingsContent)}</pre></div>`;
}

/* ═══════════════ INIT ═══════════════ */
loadContainers().then(async () => {
  const savedTab = localStorage.getItem('activeTab');
  if (savedTab === 'settings') {
    switchTab('settings');
    const savedSC = localStorage.getItem('selectedSettingsContainer');
    if (savedSC) {
      await loadSettingsContainers();
      if (settingsContainers.find(c => c.id === savedSC)) {
        await selectSettingsFolder(savedSC);
        const savedSF = localStorage.getItem('selectedSettingsFile');
        if (savedSF && settingsFiles.includes(savedSF)) {
          await selectSettingsFile(savedSF);
        }
      }
    }
  } else {
    const savedContainer = localStorage.getItem('selectedContainer');
    const savedMemory = localStorage.getItem('selectedMemory');
    if (savedContainer && containers.find(c => c.id === savedContainer)) {
      await selectFolder(savedContainer);
      if (savedMemory && currentMemories.find(m => m.filename === savedMemory)) {
        await selectMemory(savedMemory);
      }
    }
  }
});
</script>
